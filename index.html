<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SIMON SAYS</title>
</head>
<body>
  <div id="startPopup" class="popup">
  <div class="popup-box">

    <h1>🧠 Simon Says</h1>

    <p class="rules-title">Game Rules</p>

    <ul class="rules">
      <li>Watch the color sequence carefully.</li>
      <li>Repeat the same sequence.</li>
      <li>Sequence gets longer every level.</li>
      <li>Make a mistake and the game ends.</li>
    </ul>

    <button id="startBtn">Start Game</button>

  </div>
</div>
  <div class="container">
    <h1>SIMON SAYS GAME</h1>
    <h2>Simon Says follow the sequence</h2>
    <h3>Highest Score</h3>
    <div class="simon-board">
      <div class="pad purple" id="purple"></div>
      <div class="pad red" id="red"></div>
      <div class="pad yellow" id="yellow"></div>
      <div class="pad blue" id="blue"></div>
    
      <div class="center-hub">
        <div class="logo">LEVEL</div>
        <div class="level"></div>
      </div>
    </div>
  </div>
  <div id="gameOverPopup" class="popup" style="display:none;">
  <div class="popup-box">

    <h2>Game Over 😢</h2>

    <p id="finalScore"></p>

    <button class="restart">Restart Game</button>

  </div>
</div>
  <script src="app.js"></script>
</body>
</html>
